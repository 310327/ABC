<html>
<head>
    <meta charset="UTF-8">
    <title>0317筆記-框線</title>
    <style>
        div{
            width:200px;
            height: 100px;
            margin-bottom:10px;
            border:1px black solid;
        }
        /* 方向上 又 下 左*/
        #d1 {
            border-width:10px 20px 30px 40px;
        }
        #d2 {
            border-width:10px;
            border-style:solid dashed dotted double;
        }
        #d3 {
            border:50px solid transparent;
            border-color:red yellow transparent blue;
        }
        #d4 {
            width:0px;
            height:0px;
            border:50px solid transparent;
            border-width:10px 20px 30px 40px;
            border-color:red yellow green blue;
        }
        .radius {
            display: inline-block;
        }
        #d5 {
            /*border-top:10px;;
            border-bottom:;
            border-right:;
            border-left:;
            border-top-color:;*/
            border-radius:10px 20px 30px 40px;
            background-color: red;
        }
        #d6 {
            border-radius:50%;
            background-color: orange;
        }
        #d7 {
            border-radius:50px;
            background-color: yellow;
        }
        #d8 {
            border-radius:100% 100% 0% 0%;
            background-color: green;
        }
        #d9 {
            border-radius:100px 100px 0 0;
        }
        #d10 {
            width:0px;
            height:0px;
            border-width:100px 100px 0px 100px;
            border-radius:100px 100px 0 0;
            border-color:red yellow green blue;
        }
        /****************************************************************************************************/
        #canvas {
            width:600px;
            height:600px;
            border:1px solid black;
            position: relative;
        }
        #item1 {
            background-color: rgba(255,0,0,0.5) ;
            position: absolute;
            top:100px;
            left:100px;
            z-index:25;
        }
        #item2 {
            background-color: yellow;
            position: absolute;
            top:150px;
            left:150px;
            z-index:20;
        }
        #item3 {
            background-color: blue;
            position: absolute;
            top:200px;
            left:200px;
            z-index:300;

            transform: rotate(30deg) translate(100px,0px) scale(0.5,1) skew(0deg,0deg);
        }
    </style>
</head>
<body><a href = "index.html">回首頁</a><br>
    <div id="d1"></div>
    <div id="d2"></div>
    <div id="d3"></div>
    <div id="d4"></div>
    <div id="d5" class="radius"></div>
    <div id="d6" class="radius"></div>
    <div id="d7" class="radius"></div>
    <div id="d8" class="radius"></div>
    <div id="d9" class="radius"></div>
    <div id="d10" class="radius"></div>
    <hr>
    <div id="canvas">
        <div id="item1"></div>
        <div id="item2"></div>
        <div id="item3"></div>
    </div>
</body>
</html>
