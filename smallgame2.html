<html>
<head>
  <meta charset="UTF-8" />
  <title>Tetris</title>
  <style>
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { border: 2px solid #fff; background: #111; }
  </style>
</head>
<body>
  <canvas id="tetris" width="360" height="600"></canvas>
  <script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    context.scale(30,30);
    // arenaSweep 用來清除滿行
    function arenaSweep() {
      outer: for (let y = arena.length -1; y > 0; y--) {
        for (let x = 0; x < arena[y].length; ++x) {
          if (arena[y][x] === 0) continue outer; //check 0
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        y++;
      }
    }
    function checkblockmargin(arena, player) {
      const [m, o] = [player.matrix, player.pos];
      for (var y = 0; y < m.length; ++y) {//判斷邊界碰撞
        for (var x = 0; x < m[y].length; ++x) {
          if (m[y][x] !== 0 &&
              (arena[y + o.y] &&
               arena[y + o.y][x + o.x]) !== 0) {
            return true;
          }
        }
      }
      return false;
    }
    function createMatrix(w, h) {
      const matrix = [];
      const matrixStyle = '#453456';  
      while (h--) matrix.push(new Array(w).fill(0));  // 建立 h 行 w 列的0陣列
      return matrix;
    }
    function createBlock(type) {
      if (type === 'T') {
        return [
          [0, 1, 0],
          [1, 1, 1],
          [0, 0, 0],
        ];
      } else if (type === 'O') {
        return [
          [2, 2],
          [2, 2],
        ];
      } else if (type === 'L') {
        return [
          [0, 3, 0],
          [0, 3, 0],
          [0, 3, 3],
        ];
      } else if (type === 'J') {
        return [
          [0, 4, 0],
          [0, 4, 0],
          [4, 4, 0],
        ];
      } else if (type === 'I') {
        return [
          [0, 5, 0, 0],
          [0, 5, 0, 0],
          [0, 5, 0, 0],
          [0, 5, 0, 0],
        ];
      } else if (type === 'S') {
        return [
          [0, 6, 6],
          [6, 6, 0],
          [0, 0, 0],
        ];
      } else if (type === 'Z') {
        return [
          [7, 7, 0],
          [0, 7, 7],
          [0, 0, 0],
        ];
      }
    }
    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            context.fillStyle = colors[value];
            context.fillRect(x + offset.x, y + offset.y, 1, 1);     
            //set.x / offset.y 用來控制要把方塊畫在畫布的哪裡
          }
        });
      });
    }
    function draw() {
      context.fillStyle = '#dade0d';  
      context.fillRect(0, 0, canvas.width, canvas.height);    //清除畫
      drawMatrix(arena, {x:0, y:0});  //畫背景
      drawMatrix(player.matrix, player.pos);  //玩家
    }
    function Mix(arena, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {  //把玩家的方塊放到畫
          if (value !== 0) {     //如果不是0就放到畫
            arena[y + player.pos.y][x + player.pos.x] = value;    
          }
        });
      });
    }
    function rotate(matrix, dir) {  
      for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {  //rot 90度
          [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
      }
      if (dir > 0) matrix.forEach(row => row.reverse());
      else matrix.reverse();
    }
    function playerDrop() { 
      player.pos.y++;
      if (checkblockmargin(arena, player)) {      
        player.pos.y--;  
        Mix(arena, player);  //Mix
        playercreat();     //重新生成block
        arenaSweep();   //1.
      }
      dropCounter = 0;       //reset
    }
    function playerMove(dir) {              
      player.pos.x += dir;      
      if (checkblockmargin(arena, player)) player.pos.x -= dir; //防邊界
    }
    function playercreat() {         
      const pieces = 'TJLOSZI';    
      const randblock = pieces[Math.floor(Math.random() * pieces.length)];                          
      player.matrix = createBlock(randblock); //生成block / up

      player.pos.y = 0
      player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);   

      if (checkblockmargin(arena, player)) {        
        arena.forEach(row => row.fill(0));        //清除畫
      }
    }
    function playerRotate(dir) {                      
      const pos = player.pos.x;                     
      let offset = 1;                
      rotate(player.matrix, dir);

      while (checkblockmargin(arena, player)) {                      
        player.pos.x += offset;                          
        offset = -(offset + (offset > 0 ? 1 : -1));         
        if (offset > player.matrix[0].length) {           
          rotate(player.matrix, -dir);          //超過邊界         
          player.pos.x = pos;
          return;
        }
      }
    }
    let dropCounter = 0;
    let dropInterval = 250;
    let lastTime = 0;
    function update(time = 0) {
      const deltaTime = time - lastTime;
      lastTime = time;
      dropCounter += deltaTime;
      if (dropCounter > dropInterval) {
        playerDrop();
      }
      draw();
      requestAnimationFrame(update); //呼叫下一tick
    }
    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowLeft') playerMove(-1);
      else if (event.key === 'ArrowRight') playerMove(1);
      else if (event.key === 'ArrowDown') playerDrop();
      else if (event.key === 'q') playerRotate(-1);
      else if (event.key === 'w') playerRotate(1);
    });
    const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
    const arena = createMatrix(12, 20);
    const player = {
      pos: {x: 0, y: 0},
      matrix: null,
    };
    playercreat();
    update();
  </script>
</body>
</html>
